services:
  - type: web
    name: notas-saas-app
    runtime: node
    plan: free
    region: oregon
    buildCommand: cd server && npm install --include=dev && npx prisma generate && npx prisma migrate deploy && cd ../client && npm install --include=dev && npm run build
    startCommand: cd server && npm run start
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      - key: NPM_CONFIG_PRODUCTION
        value: "false"
      - key: DATABASE_URL
        fromDatabase:
          name: notas-saas-db
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGINS
        sync: false

databases:
  - name: notas-saas-db
    plan: free
    databaseName: notas_saas
    user: notas_saas_user
