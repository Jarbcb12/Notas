services:
  - type: web
    name: notas-saas-app
    runtime: node
    plan: free
    region: oregon
    buildCommand: |
      cd server && npm install && npx prisma generate
      cd ../client && npm install && npm run build
    startCommand: cd server && npm run migrate:deploy && npm run start
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: notas-saas-db
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGINS
        sync: false

databases:
  - name: notas-saas-db
    plan: free
    databaseName: notas_saas
    user: notas_saas_user
